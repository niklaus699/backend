version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: local-docker-secret
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      SECURE_SSL_REDIRECT: "False"
      DB_SSLMODE: prefer
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker_ingestion:
    build: .
    command: celery -A config worker --queues=ingestion --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: local-docker-secret
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DB_SSLMODE: prefer
    depends_on:
      - postgres
      - redis

  worker_correlation:
    build: .
    command: celery -A config worker --queues=correlation --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: local-docker-secret
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DB_SSLMODE: prefer
    depends_on:
      - postgres
      - redis

  beat:
    build: .
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: local-docker-secret
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DB_SSLMODE: prefer
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
